project_name: "codealpha_object_detection_pro_demo"
source: "0"

model:
  weights: "yolov8n.pt"
  tracker: "bytetrack.yaml"
  confidence: 0.30
  iou: 0.45
  image_size: 640
  device: "cpu"

output:
  show_window: true
  save_video: true
  save_analytics_json: true
  output_dir: "artifacts/runs"
  window_name: "CodeAlpha Object Detection Pro Demo"
  video_name_prefix: "pro_demo_run"
  analytics_name_prefix: "pro_demo_analytics"
  display_scale: 1.0

features:
  draw_trails: true
  trail_length: 40

  analytics:
    enable_line_counting: true
    count_line:
      - [200, 300]
      - [1000, 300]

    enable_zone_counting: true
    zones:
      - name: "Observation Zone"
        polygon:
          - [80, 80]
          - [1220, 80]
          - [1220, 650]
          - [80, 650]
        color: [0, 255, 0]
        count_classes: ["person", "car", "truck", "bus", "motorbike", "bicycle"]
        restricted: false

      - name: "Restricted Area"
        polygon:
          - [860, 150]
          - [1220, 150]
          - [1220, 650]
          - [860, 650]
        color: [0, 120, 255]
        count_classes: ["person"]
        restricted: true

    intrusion:
      enabled: true
      classes: ["person"]
      cooldown_frames: 45

    speed:
      enabled: true
      pixels_per_meter: 12.0
      smoothing_window: 8
      classes: ["person", "car", "truck", "bus", "motorbike", "bicycle"]

  privacy:
    enabled: true
    mode: "face"
    classes: ["person"]
    blur_kernel_size: 31

  pose:
    enabled: true
    weights: "yolov8n-pose.pt"
    confidence: 0.35
    draw_labels: false
    classes: [0]
